name: agnosticity

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  portable-surfaces:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run agnosticity lint
        run: bash bubbles/scripts/agnosticity-lint.sh --verbose

  release-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run release hygiene
        run: bash bubbles/scripts/cli.sh release-check