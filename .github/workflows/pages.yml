name: Deploy Cheatsheet to GitHub Pages
on:
  push:
    branches: [ main ]
  workflow_dispatch:


permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build Pages site
      run: |
        mkdir -p _site
        cp docs/its-not-rocket-appliances.html _site/index.html
        cp docs/CHEATSHEET.md _site/CHEATSHEET.md
        cp -r icons _site/icons 2>/dev/null || true
        cp -r pictures _site/pictures 2>/dev/null || true

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '_site'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
