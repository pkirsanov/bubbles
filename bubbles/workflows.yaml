# governance-version: 2.2.0\nversion: 1
defaultMode: full-delivery

gates:
  G001:
    name: artifact_gate
    description: Required artifacts exist for current feature/bug context.
  G002:
    name: scope_definition_gate
    description: Active scope contains scenarios, implementation plan, test plan, and DoD.
  G003:
    name: test_integrity_gate
    description: Test classifications match execution reality.
  G004:
    name: test_execution_gate
    description: Required tests executed and passing.
  G005:
    name: evidence_gate
    description: Raw execution evidence is captured per policy.
  G006:
    name: docs_sync_gate
    description: Feature and standard docs are updated and coherent.
  G007:
    name: validation_gate
    description: Validation checks pass and regressions are addressed.
  G008:
    name: audit_gate
    description: Audit verdict is acceptable.
  G009:
    name: chaos_gate
    description: Required chaos rounds complete without unresolved failures.
  G010:
    name: user_validation_gate
    description: uservalidation checklist is updated according to policy.
  G011:
    name: session_gate
    description: Session and feature state are updated for resume.
  G012:
    name: final_promotion_gate
    description: All mode-required gates pass in current session.
  G013:
    name: priority_selection_gate
    description: Highest-value next work item is selected with explicit rationale. Enforced by bubbles.workflow agent behavior (value-first scoring output), not by script. Agent MUST emit selection rationale per BUBBLES_WORKFLOWS.md template.
  G014:
    name: bootstrap_readiness_gate
    description: For new/underspecified work, design/spec/scopes are ready before implementation.
  G015:
    name: scenario_depth_gate
    description: Spec/design/scopes contain detailed user stories and Gherkin scenarios covering declared use cases/models/algorithms.
  G016:
    name: gherkin_e2e_traceability_gate
    description: Every required Gherkin scenario maps to specific E2E tests and expected assertions.
  G017:
    name: dod_e2e_expansion_gate
    description: DoD explicitly includes high-quality E2E items aligned with scenario/use-case coverage.
  G018:
    name: dod_completion_gate
    description: A spec cannot be promoted to done while any DoD checkbox remains unchecked.
  G019:
    name: sequential_spec_completion_gate
    description: Previous spec in batch MUST be fully complete (done/blocked) with ALL gates passed before starting next spec. No parallel or premature advancement.
  G020:
    name: cross_agent_verification_gate
    description: Each specialist agent's output MUST be verified by the orchestrator before advancing to the next phase. Verification includes checking that commands were actually executed (not fabricated), evidence exists, and exit codes are real.
  G021:
    name: anti_fabrication_gate
    description: Detect and block fabricated evidence. Applies heuristics - evidence sections with fewer than 10 lines, evidence that matches expected output templates verbatim, DoD items batch-checked without sequential execution, timestamps that are impossible (all identical or out of order).
  G022:
    name: specialist_completion_gate
    description: ALL specialist agents required by the mode (test, docs, validate, audit, chaos) MUST have executed and returned verifiable results before spec promotion. Missing specialist execution is a BLOCKING failure.
  G023:
    name: state_transition_guard_gate
    description: MANDATORY mechanical enforcement gate. The state-transition-guard.sh script MUST be executed and exit with code 0 before ANY state.json status transition to "done". This gate verifies DoD completion, scope status consistency, specialist phases, timestamp plausibility, test file existence, evidence depth, template placeholders, and artifact lint in one blocking pass. Agents MUST NOT write "status":"done" without this gate passing.
  G024:
    name: all_scopes_done_before_spec_done_gate
    description: ABSOLUTE BLOCKING gate. A spec CANNOT be marked "done" in state.json until EVERY scope in scopes.md has status "Done". Zero scopes with "Not Started", "In Progress", or "Blocked" are allowed. This is a hard dependency — no override, no workaround, no exception. Agents MUST verify by running grep for non-Done scope statuses and confirming zero matches before writing "done" to state.json.
  G025:
    name: per_dod_item_raw_evidence_gate
    description: ABSOLUTE BLOCKING gate. EVERY DoD item marked [x] MUST have raw terminal output evidence (≥10 lines) recorded INLINE directly beneath it in scopes.md. Items without evidence are INVALID even if checked. Each item MUST be individually validated — batch-checking is forbidden. Test-related DoD items MUST show real test execution covering ALL scenarios (Gherkin, error paths, boundary conditions, parameter permutations) with 100% business logic coverage. Tests MUST be real (no internal mocks, real test DBs, real assertions that fail if feature is broken). Agents MUST verify each [x] item has evidence before marking scope Done.
  G026:
    name: sla_stress_coverage_gate
    description: Scopes defining latency SLAs (p95, p99, response time targets) MUST have stress tests in the Test Plan and DoD, executed and passing with evidence.
  G027:
    name: phase_scope_coherence_gate
    description: ABSOLUTE BLOCKING gate. completedPhases claiming implementation phases (implement, test) MUST have matching non-empty completedScopes AND Done scope artifacts. Claiming 6-7 lifecycle phases complete while completedScopes is empty or partial = FABRICATION. Guard script Check 15 enforces mechanically.
  G028:
    name: implementation_reality_scan_gate
    description: ABSOLUTE BLOCKING gate. Source files referenced in scope artifacts MUST NOT contain stub/fake/hardcoded data patterns. Gateway handlers returning vec![...] with literal data instead of real service calls, frontend hooks calling getSimulationData() or containing zero fetch() calls = BLOCKING. Enforced by implementation-reality-scan.sh via guard script Check 16.
  G029:
    name: integration_completeness_gate
    description: Every implemented artifact (endpoint, library, page, service, migration, proto) MUST be wired into the running system with at least one real consumer. Backend endpoints consumed by frontends or documented external-only. Libraries imported by consumers. Frontend using real APIs (no stubs/mocks/hardcoded data). Verified by grep-based consumer checks.
  G030:
    name: no_defaults_no_fallbacks_gate
    description: ABSOLUTE BLOCKING gate. Production code MUST NOT contain default/fallback values that mask missing configuration or hide failures. Patterns like unwrap_or(), unwrap_or_default(), || "default", ?? "fallback", os.getenv("K", "default"), ${VAR:-default} are FORBIDDEN. All config MUST fail-fast if missing. Enforced by implementation-reality-scan.sh Scan 5.
  G031:
    name: findings_artifact_update_gate
    description: Agent findings recorded in scope artifacts (scopes.md/state.json) before verdict.
  G032:
    name: business_analysis_gate
    description: spec.md contains actors, use cases, business scenarios, and UI wireframes (when applicable). Competitive analysis is documented. Requirements are traceable and testable. Gate passes if spec.md has the required sections or if scope explicitly does not need business analysis (backend-infra work, bug fixes, etc.).
  G033:
    name: design_readiness_gate
    description: ABSOLUTE BLOCKING gate for the implement phase. design.md MUST exist and contain substantive technical design (not stubs/placeholders). scopes.md MUST exist with at least one scope containing Gherkin scenarios, a Test Plan, and a Definition of Done. When this gate fails, the workflow MUST auto-escalate by invoking bubbles.design → bubbles.plan before proceeding to implement. This gate prevents implementation from starting with only spec.md. Exempt for bugfix-fastlane mode (bugs may not need new design artifacts).
  G034:
    name: security_gate
    description: Security scan clean — no critical or high severity vulnerabilities. Dependency audit passed, code review found no injection/XSS/SSRF/auth-bypass findings above medium severity. When this gate fails, the workflow MUST route to bubbles.implement to fix security findings before proceeding.
  G035:
    name: vertical_slice_gate
    description: >-
      ABSOLUTE BLOCKING gate. When a scope produces BOTH frontend AND backend code,
      the vertical slice MUST be complete — every frontend API call MUST map to a
      .route()-wired backend handler, every backend handler MUST be registered in the
      service router, gateway/proxy forwarding rules MUST exist for all service
      endpoints, and E2E tests MUST exercise the full stack (frontend → gateway →
      service → data store). Applies conditionally — pure-backend or pure-frontend
      scopes are exempt. When this gate fails, the workflow MUST route to
      bubbles.implement to complete the vertical wiring before proceeding. Detection:
      cross-reference frontend fetch/useQuery/dio calls against backend router .route()
      registrations and gateway forwarding config.
  G036:
    name: red_green_traceability_gate
    description: New or changed behavior MUST show red→green evidence. Agents MUST capture failing targeted test or reproduction evidence before accepting a fix, then capture passing evidence after the change. Docs-only and artifact-only work are exempt.
  G037:
    name: scope_size_discipline_gate
    description: Scopes and DoD items MUST stay small, isolated, and single-outcome by default. Optional time-budget hints like maxScopeMinutes and maxDodMinutes tighten the limit further. Mixed-purpose scopes MUST be split unless explicitly justified.
  G038:
    name: micro_fix_containment_gate
    description: Narrow failures MUST be handled by narrow repair loops first. Compile, lint, validation, and test failures must be fixed with the smallest viable context before broader reruns or escalations are allowed.
  G039:
    name: self_healing_containment_gate
    description: Self-healing fix loops MUST NOT stack. maxDepth=1 — a fix attempt NEVER triggers another fix loop. maxRetries=3 per failure, maxTotalRetries=5 per phase. Context narrows on each retry (full → file → function). If a fix introduces a NEW error, it counts against the same retry budget. No recursion, no nesting.
  G040:
    name: zero_deferral_language_gate
    description: >-
      ABSOLUTE BLOCKING gate. Scope artifacts (scopes.md or scopes/*/scope.md) and
      report files MUST NOT contain deferral language indicating incomplete work.
      Patterns detected: deferred, defer to, future scope, future work, follow-up,
      followup, out of scope, not in scope, will address later, revisit later,
      separate ticket, separate issue, punt, punted, postpone, postponed, skip for now,
      not implemented yet, not yet implemented, placeholder, temporary workaround.
      Mechanically enforced by state-transition-guard.sh Check 18. When this gate fails,
      the agent MUST either complete the deferred work NOW or remove the DoD item with
      justification — NEVER mark the spec done with outstanding deferred work.
  G041:
    name: dod_format_integrity_gate
    description: >-
      ABSOLUTE BLOCKING gate. Prevents agents from bypassing DoD completion checks by
      reformatting checkbox items or inventing non-canonical scope statuses.
      THREE enforcement layers:
      (1) DoD FORMAT — Only '- [ ] ' and '- [x] ' are valid DoD item formats inside
      Definition of Done sections. Patterns like '- (deferred) ...', '- ~~...~~',
      '- *deferred* ...', or '- Text without checkbox' are FORBIDDEN manipulations.
      (2) SCOPE STATUS — Only four canonical statuses are valid: 'Not Started',
      'In Progress', 'Done', 'Blocked'. Invented statuses like 'Deferred',
      'Deferred — Planned Improvement', 'Skipped', 'N/A' are FORBIDDEN.
      (3) DoD ITEM DELETION — Removing DoD items to pass checkbox validation is
      structural fabrication. If a prior workflow phase added DoD items, they MUST
      remain as checkboxes until legitimately completed with evidence or explicitly
      removed with documented justification in the same commit.
      Mechanically enforced by state-transition-guard.sh Checks 4A and 4B.

failureRouting:
  code: implement
  test: test
  docs: docs
  compliance: validate
  audit: audit
  chaos: implement
  environment: validate

retryPolicy:
  maxPhaseRetries: 3
  maxIdenticalFailures: 2
  defaultMaxChaosRounds: 3

# Auto-Continuation & Mode Escalation Policy (NON-NEGOTIABLE)
#
# Workflow agents MUST complete all target work without stopping to suggest
# commands. When a workflow discovers that different actions are needed
# (e.g., specs need hardening, bugs block progress, gaps need closing),
# it MUST automatically escalate inline rather than stopping and suggesting
# a different mode.
#
# `runUntilComplete: true` is the DEFAULT for all delivery modes (statusCeiling: done).
# Agents MAY NOT stop and suggest resume commands unless a truly terminal
# condition is reached (see terminalStopConditions below).
#
# `autoModeEscalation: true` is the DEFAULT for all delivery modes.
# When an agent discovers work that would normally require a different mode,
# it MUST handle it inline by invoking the appropriate specialist agents
# rather than stopping and recommending a mode switch.

autoEscalation:
  enabled: true
  # Inline escalation paths — when a condition is detected, invoke these
  # agents inline via runSubagent and continue the workflow. NEVER stop.
  inlineActions:
    missingArtifacts:
      description: Required artifacts (spec.md, design.md, scopes.md) are missing or incomplete
      action: invoke bubbles.design → bubbles.plan → continue current workflow
    missingDesignBeforeImplement:
      description: implement phase reached but design.md or scopes.md are missing/stubs (G033 failure)
      action: invoke bubbles.design → bubbles.clarify → bubbles.plan inline → then proceed to implement
    specsNeedHardening:
      description: Specs/scopes are underspecified, missing Gherkin, weak DoD
      action: invoke bubbles.harden inline → continue current workflow
    bugsDiscovered:
      description: Bugs found during implementation or testing
      action: invoke bubbles.bug → bubbles.implement → bubbles.test inline → continue
    gapsDiscovered:
      description: Implementation gaps found during validation or audit
      action: invoke bubbles.gaps → bubbles.implement inline → continue
    testFailures:
      description: Tests fail after implementation
      action: invoke the smallest failing-scope fix loop first (bubbles.implement with only the failing command/file/scope context) → bubbles.test on the impacted tests → continue when clean
    compileOrLintFailures:
      description: Compile, type-check, or lint failures occur during implement/test/validate
      action: invoke a micro-fix loop scoped to the failing file or symbol → rerun only the failing command → continue when resolved
    validationFailures:
      description: Validation finds a concrete broken contract, stale artifact, or missing evidence path
      action: invoke the owning specialist for the precise failure class, repair only that contract/evidence path, rerun impacted validation, then continue
    artifactDrift:
      description: State claims don't match reality (stale completedPhases, wrong status)
      action: reconcile state inline → continue current workflow
  # Self-healing loop configuration (G039)
  selfHealingLoop:
    maxDepth: 1          # NEVER nest — a fix attempt cannot trigger another fix attempt
    maxRetries: 3        # Per failure, max 3 attempts with the same error context
    maxTotalRetries: 5   # Across ALL failures in one phase, hard cap
    narrowingRule: |
      Retry 1: full error context + surrounding code
      Retry 2: only the failing file + error message
      Retry 3: only the specific function/block + error message
      After 3: escalate to next agent or mark blocked
    antiStackingRule: |
      A self-healing fix attempt is NEVER allowed to trigger another
      self-healing loop. If a fix introduces a NEW error, it counts
      against the same retry budget. No recursion. No nesting.
  # Truly terminal conditions — ONLY these justify stopping the workflow
  terminalStopConditions:
    - all_target_specs_done_or_blocked_after_max_retries
    - user_explicitly_requested_stop
    - no_specs_could_be_resolved_from_input
  # Conditions that MUST NOT cause a stop — handle inline instead
  neverStopFor:
    - mode_seems_suboptimal
    - different_workflow_would_be_better
    - artifacts_need_repair
    - specs_need_hardening
    - bugs_need_fixing
    - gaps_need_closing
    - test_failures_fixable
    - state_drift_detected

# Project-local custom gates (discovered from .github/bubbles-project.yaml)
# These are NEVER defined in this file — this file is 100% Bubbles-owned.
# Custom gates are auto-discovered by the state transition guard script.
# See bubbles.super agent and bubbles-project.yaml for management.
customGatesDiscovery:
  configFile: .github/bubbles-project.yaml
  idRange: G100+
  enforcement: auto-discovered by state-transition-guard.sh

# Lessons memory auto-compaction
lessonsMemory:
  file: .specify/memory/lessons.md
  archiveFile: .specify/memory/lessons-archive.md
  maxLines: 150
  autoCompactTrigger: workflow_start
  recencyTiers:
    recent: 30d       # Full detail
    aging: 90d        # Problem + fix only
    archive: 90d+     # Moved to archive file
  deduplicationThreshold: 3  # Same root cause 3+ times → collapse

# Metrics collection (optional, off by default)
metrics:
  enabled: false
  storageFile: .specify/metrics/events.jsonl
  configFile: .specify/memory/bubbles.config.json
  enableCommand: "bubbles.sh metrics enable"
  disableCommand: "bubbles.sh metrics disable"

priorityScoring:
  model: weighted_sum
  scoreRange:
    min: 0
    max: 100
  weights:
    userImpact: 30
    deliveryBlocker: 25
    complianceRisk: 15
    regressionRisk: 10
    readiness: 10
    effortInverse: 10
  dimensions:
    userImpact:
      scale: 0-5
      guidance:
        5: user-facing regression or core journey break
        3: high-value workflow degradation
        1: minor operator inconvenience
    deliveryBlocker:
      scale: 0-5
      guidance:
        5: blocks required gate or release progression
        3: blocks one scope while alternatives exist
        1: non-blocking issue
    complianceRisk:
      scale: 0-5
      guidance:
        5: security/compliance/audit failure likely
        3: policy drift risk
        1: low compliance relevance
    regressionRisk:
      scale: 0-5
      guidance:
        5: likely to produce widespread regressions
        3: localized regression potential
        1: low regression risk
    readiness:
      scale: 0-5
      guidance:
        5: scope/design/spec ready to execute now
        3: partial readiness, small bootstrap needed
        1: underdefined, heavy bootstrap required
    effortInverse:
      scale: 0-5
      guidance:
        5: small effort, high return
        3: medium effort, medium return
        1: large effort before value realized
  tieBreakers:
    - highest_deliveryBlocker
    - highest_userImpact
    - highest_readiness
    - lowest_effort
    - stable_sort_by_spec_id

phases:
  analyze:
    owner: bubbles.workflow
    requiredGates: [G032]
  discover:
    owner: bubbles.workflow
    requiredGates: [G011, G013]
  select:
    owner: bubbles.iterate
    requiredGates: [G001, G011]
  bootstrap:
    owner: bubbles.workflow
    requiredGates: [G014]
  harden:
    owner: bubbles.harden
    requiredGates: [G015, G016, G017]
  gaps:
    owner: bubbles.gaps
    requiredGates: [G001, G002]
  bug:
    owner: bubbles.bug
    requiredGates: [G001, G031]
  implement:
    owner: bubbles.implement
    requiredGates: [G002, G033]
  test:
    owner: bubbles.test
    requiredGates: [G003, G004, G005]
  docs:
    owner: bubbles.docs
    requiredGates: [G006]
  validate:
    owner: bubbles.validate
    requiredGates: [G007]
  audit:
    owner: bubbles.audit
    requiredGates: [G008]
  chaos:
    owner: bubbles.chaos
    requiredGates: [G009]
  simplify:
    owner: bubbles.simplify
    requiredGates: [G031]
  stabilize:
    owner: bubbles.stabilize
    requiredGates: [G031]
  security:
    owner: bubbles.security
    requiredGates: [G034]
  finalize:
    owner: bubbles.workflow
    requiredGates: [G010, G011, G012]

# Status Ceiling Policy (NON-NEGOTIABLE)
#
# Each mode defines the MAXIMUM status it is allowed to set in state.json.
# Modes that only produce planning/documentation artifacts MUST NOT set
# status to "done". Only modes that include implementation + test phases
# with passing evidence may set status to "done".
#
# Allowed ceilings:
#   done             - Full implementation + tests completed and verified
#   specs_hardened   - Planning artifacts improved, no implementation done
#   docs_updated     - Documentation updated, no implementation done
#   validated        - Validation/audit completed, no implementation done
#   in_progress      - Partial work, used for resume-only

# Mode Defaults (applied to ALL modes with statusCeiling: done)
#
# These constraints are inherited by every delivery mode unless explicitly
# overridden with `false` in the mode's own constraints block.
modeDefaults:
  deliveryModes:
    # Workflow MUST run to completion — no stopping to suggest commands.
    # Only truly terminal conditions (all specs done/blocked, user stop,
    # unresolvable input) are allowed stop reasons.
    runUntilComplete: true
    # When the workflow discovers that different actions are needed
    # (e.g., specs need hardening, bugs block progress, gaps need closing),
    # it MUST handle them inline by invoking specialist agents rather than
    # stopping and suggesting the user run a different mode.
    autoModeEscalation: true
    # Delivery stays autonomous unless the caller explicitly opts into
    # an interactive clarification loop.
    defaultAutonomy: autonomous
    allowOptionalSocraticDiscovery: true
    allowGitIsolationFlag: true
    allowAutoCommitFlag: true
    requireSmallWellDefinedScopes: true
    requireRedGreenEvidence: true
    enableMicroFixLoops: true
    inheritedRequiredGates: [G036, G037, G038, G040]

# Batch Execution Parameter (NON-NEGOTIABLE)
#
# `batch: true|false` is a UNIVERSAL parameter for delivery modes.
# When enabled, the orchestrator splits the mode's phaseOrder at the last
# `implement` phase: phases up to and including implement run per-spec,
# phases after implement run ONCE covering all specs together.
#
# This avoids redundant builds when multiple specs touch the same codebase.
#
# Split rule: per-spec = phases up to and including the LAST implement in
# phaseOrder. Shared = everything after that implement.
#
# Auto-detection: batch defaults to true when multiple specs are targeted,
# false when a single spec is targeted. User can override with batch: true
# or batch: false explicitly.
batchExecution:
  # Auto-detect based on spec count: >1 spec = batch, 1 spec = sequential
  autoDetect: true
  autoDetectRule: "batch = (target_spec_count > 1)"
  # Mechanical split rule applied to any mode when batch is enabled
  splitRule: at_last_implement
  # These constraints are auto-applied when batch is enabled
  inheritedConstraints:
    batchImplementation: true
    sequentialWithinBatch: true
    singleBuildAfterBatch: true
    perSpecDodRequired: true
  # G019 (sequentialSpecCompletion) is relaxed within the batch —
  # specs proceed through per-spec phases without waiting for previous
  # spec's full quality chain. ALL specs must pass ALL gates before
  # ANY spec is marked done.

executionOptions:
  description: Universal optional workflow tags. These never override the default autonomous behavior unless explicitly enabled.
  optionalWorkflowTags:
    socratic:
      type: boolean
      default: false
      meaning: Enable a bounded clarification loop before discovery/bootstrap work.
    socraticQuestions:
      type: integer
      default: 3
      min: 1
      max: 5
      meaning: Maximum number of targeted Socratic questions when socratic=true.
    gitIsolation:
      type: boolean
      default: false
      meaning: Opt into isolated branch/worktree setup before implementation when repo policy allows it.
    autoCommit:
      type: string
      default: "off"
      values:
        off: No automatic commits
        scope: Commit after scope reaches Done (recommended)
        dod: Commit after each validated DoD item (fine-grained)
      commitMessageTemplate: |
        bubbles({spec}/{scope}): {scope_name} — {status}
        
        Spec: {spec_name}
        Scope: {scope_id}-{scope_name}
        DoD: {checked}/{total} checked
        Agent: {agent_name}
      meaning: Opt into atomic commits after validated milestones.
    maxScopeMinutes:
      type: integer
      default: null
      meaning: Optional planning heuristic for maximum intended effort per scope.
    maxDodMinutes:
      type: integer
      default: null
      meaning: Optional planning heuristic for maximum intended effort per DoD item.
    microFixes:
      type: boolean
      default: true
      meaning: Keep failure recovery inside narrow error-scoped fix loops before broader retries.

modes:
  value-first-e2e-batch:
    description: Discover highest-value next work (spec/scope/bug/gap/hardening/new feature), bootstrap missing artifacts, then run full E2E delivery loop.
    statusCeiling: done
    phaseOrder: [discover, select, bootstrap, implement, test, security, docs, validate, audit, chaos, finalize]
    requiredGates: [G001, G002, G003, G004, G005, G006, G007, G008, G009, G010, G011, G012, G013, G014, G018, G019, G020, G021, G022, G023, G024, G025, G026, G027, G028, G029, G030, G033, G035, G040]
    maxChaosRounds: 5
    constraints:
      valueFirstSelection: true
      allowBootstrapIterations: true
      bootstrapAgents: [bubbles.design, bubbles.clarify, bubbles.plan]
      bootstrapLoopExit: design_spec_scopes_ready
      executionWorkflowMode: full-delivery
      usePriorityScoring: true
      scoringProfile: default
      sequentialSpecCompletion: true
      crossAgentVerification: true
      antiFabricationDetection: true
      requireAllSpecialistsComplete: true
      requireAllScopesDoneBeforeSpecDone: true
      requirePerDodItemRawEvidence: true
      requireTestsForAllRealScenarios: true
      require100PercentBusinessLogicCoverage: true
      requirePhaseScopeCoherence: true
      requireImplementationRealityScan: true
      requireNoDefaultsNoFallbacks: true
      requireIntegrationCompleteness: true

  spec-scope-hardening:
    description: Harden spec/design/scopes quality and expand Gherkin-to-E2E coverage before implementation.
    statusCeiling: specs_hardened
    phaseOrder: [select, bootstrap, harden, docs, validate, audit, finalize]
    requiredGates: [G001, G002, G006, G007, G008, G010, G011, G012, G014, G015, G016, G017]
    constraints:
      requireDetailedStoriesAndGherkin: true
      requireGherkinToE2ETraceability: true
      requireDoDE2EExpansion: true
      requireScenarioCoverageAcrossDeclaredUseCases: true
      focus: specs_and_scopes_only
      allowImplementationForFindings: false

  full-delivery:
    description: Default complete delivery workflow. Includes bootstrap phase to ensure design/scopes exist before implementation.
    statusCeiling: done
    phaseOrder: [select, bootstrap, implement, test, security, docs, validate, audit, chaos, finalize]
    requiredGates: [G001, G002, G003, G004, G005, G006, G007, G008, G009, G010, G011, G012, G014, G018, G019, G020, G021, G022, G023, G024, G025, G026, G027, G028, G029, G030, G033, G034, G035]
    maxChaosRounds: 3
    constraints:
      requireDesignBeforeImplement: true
      allowBootstrapIterations: true
      bootstrapAgents: [bubbles.design, bubbles.clarify, bubbles.plan]
      bootstrapLoopExit: design_spec_scopes_ready
      sequentialSpecCompletion: true
      crossAgentVerification: true
      antiFabricationDetection: true
      requireAllSpecialistsComplete: true
      requireAllScopesDoneBeforeSpecDone: true
      requirePerDodItemRawEvidence: true
      requireTestsForAllRealScenarios: true
      require100PercentBusinessLogicCoverage: true
      requirePhaseScopeCoherence: true
      requireImplementationRealityScan: true
      requireNoDefaultsNoFallbacks: true
      requireIntegrationCompleteness: true

  full-delivery-strict:
    description: Strict full delivery with per-spec commits, no blocked continuation, and mandatory per-spec chaos/validation/audit completion. Includes bootstrap phase for design readiness.
    statusCeiling: done
    phaseOrder: [select, bootstrap, implement, test, security, docs, validate, audit, chaos, finalize]
    requiredGates: [G001, G002, G003, G004, G005, G006, G007, G008, G009, G010, G011, G012, G014, G018, G019, G020, G021, G022, G023, G024, G025, G026, G027, G028, G029, G030, G033, G034, G035]
    maxChaosRounds: 5
    constraints:
      continueOnBlocked: false
