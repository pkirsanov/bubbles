  stochastic-quality-sweep:
    description: Run multiple randomized rounds where each round picks a random spec (from all specs by default, or from a user-provided subset) AND a random trigger agent from a configurable pool, probes that spec, then runs a trigger-specific fix cycle if findings exist. Rounds limited by count or time budget. For adversarial quality hardening across specs via random probe angles.
    statusCeiling: done
    phaseOrder: [select, chaos, harden, gaps, simplify, stabilize, security, validate, bug, implement, test, validate, audit, docs, finalize]
    requiredGates: [G001, G002, G003, G004, G005, G006, G007, G008, G009, G010, G011, G012, G015, G016, G017, G018, G019, G020, G021, G022, G023, G024, G025, G026, G027, G028, G029, G030, G031, G033, G034, G035]
    maxChaosRounds: 5
    constraints:
      # Stochastic round execution model — NOT sequential phaseOrder.
      # The orchestrator runs N rounds, each round:
      #   1. Pick a random spec from the spec pool
      #      - Default pool: ALL specs discovered from specs/ folder
      #      - Optional: user provides spec targets (range, list, paths) to limit the pool
      #   2. Pick a random trigger from triggerAgentPool (or user-specified subset)
      #   3. Execute the trigger phase against the selected spec
      #   4. If findings exist, run the trigger-specific fix cycle for that spec
      #   5. If clean, skip fix cycle and proceed to next round
      # After all rounds: docs → finalize (per-spec)
      stochasticRoundExecution: true
      # Spec pool discovery: when no spec targets provided, discover ALL spec
      # folders under specs/ as the pool. User can restrict with standard spec
      # target syntax (range: 011-037, list: 011,027,037, paths: specs/...).
      autoDiscoverAllSpecs: true
      # Default trigger pool — all probing/quality agents
      # User can override with triggerAgents option to limit the pool
      triggerAgentPool: [chaos, harden, gaps, simplify, stabilize, validate, improve, security]
      # Max rounds (overridable via maxRounds user option)
      defaultMaxRounds: 10
      # Time budget in minutes (overridable via minutes user option)
      # When set, rounds continue until time runs out (finishing the active round)
      defaultTimeBudgetMinutes: 60
      # Per-trigger fix cycles — each trigger agent needs a different
      # sequence of phases to resolve its findings.
      # EVERY fix cycle containing `implement` MUST include `bootstrap` before it
      # to ensure design.md and scopes.md are substantive (Gate G033 enforcement).
      # The bootstrap phase is conditional — it verifies design readiness and only
      # invokes design/plan agents if artifacts are missing or insufficient.
      # chaos: finds runtime bugs → document bug → bootstrap design → implement fix → verify
      # harden: finds spec/coverage gaps → bootstrap design → implement code+tests → verify
      # gaps: finds missing implementations → bootstrap design → implement new code → verify
      # simplify: makes cleanup changes itself → only verify nothing broke
      # stabilize: finds perf/infra/config issues → bootstrap design → implement fix → verify
      # validate: finds regressions/violations → bootstrap design → implement fixes → verify
      triggerFixCycles:
        chaos: [bug, bootstrap, implement, test, validate, audit]
        harden: [bootstrap, implement, test, validate, audit]
        gaps: [bootstrap, implement, test, validate, audit]
        simplify: [test, validate, audit]
        stabilize: [bootstrap, implement, test, validate, audit]
        validate: [bootstrap, implement, test, validate, audit]
        # improve trigger: runs full analyst→UX→design→plan pipeline before implementation
        # bubbles.analyst analyzes existing capabilities and proposes improvements,
        # bubbles.ux creates wireframes, bubbles.design updates design.md,
        # bubbles.plan updates scopes.md, then implement carries out the changes
        improve: [analyze, bootstrap, implement, test, validate, audit]
        # security trigger: runs dependency scan + code review + threat modeling,
        # then bootstraps design artifacts → implements fixes for any findings
        security: [bootstrap, implement, test, validate, audit]
      # Shared tail phases after all rounds complete
      tailPhases: [docs, finalize]
      sequentialSpecCompletion: true
      crossAgentVerification: true
      antiFabricationDetection: true
      requireAllSpecialistsComplete: true
      requireAllScopesDoneBeforeSpecDone: true
      requirePerDodItemRawEvidence: true
      requireTestsForAllRealScenarios: true
      require100PercentBusinessLogicCoverage: true
      requirePhaseScopeCoherence: true
      requireImplementationRealityScan: true
      requireNoDefaultsNoFallbacks: true
      requireIntegrationCompleteness: true

  iterate:
    description: Priority-driven iterative execution loop. Each iteration picks the highest-priority work item across all specs (bugs, incomplete scopes, gaps, hardening needs, improvements, chaos probes), auto-selects the correct workflow mode for that work, and executes a full delivery cycle. Runs for N iterations or until a time budget is exhausted. Unlike stochastic-quality-sweep (random probing), iterate is deterministic and priority-ordered. Supports ALL work types including implementation, bug fixes, improvements, chaos hardening, gap closure, and competitive analysis.
    statusCeiling: done
    # phaseOrder represents the SUPERSET of all possible phases iterate may use.
    # Each iteration selects a SUBSET based on auto-mode-selection (Work-Type-to-Mode Mapping).
    phaseOrder: [discover, select, analyze, bootstrap, harden, gaps, simplify, stabilize, security, bug, implement, test, docs, validate, audit, chaos, finalize]
    requiredGates: [G001, G002, G003, G004, G005, G006, G007, G008, G009, G010, G011, G012, G018, G019, G020, G021, G022, G023, G024, G025, G026, G027, G028, G029, G030, G033, G035]
    constraints:
      # Iterate round execution model — priority-driven, NOT random.
      # Each round:
      #   1. bubbles.iterate picks the highest-priority work item across all specs
      #      using its Priority 0-4 selection logic
      #   2. bubbles.iterate auto-selects the correct workflow mode for the work
      #      (bugfix-fastlane, full-delivery, improve-existing, chaos-hardening, etc.)
      #   3. bubbles.iterate dispatches to specialist agents following the selected
      #      mode's phaseOrder
      #   4. After the work item is complete (or blocked), the round ends
      #   5. Next round: re-evaluate priorities and pick the next work item
      # After all rounds: per-spec finalize for any spec that was touched
      iterativeRoundExecution: true
      # When no spec targets provided, iterate picks across ALL specs
      autoDiscoverAllSpecs: true
      # Priority-driven work selection (deterministic, not random)
      priorityDrivenWorkSelection: true
      # Auto-mode selection — iterate determines the correct workflow mode
      # for each work item based on its type (see Work-Type-to-Mode Mapping)
      autoModeSelection: true
      # Supported sub-modes that iterate can dispatch per-iteration
      supportedSubModes:
        - full-delivery
        - bugfix-fastlane
        - feature-bootstrap
        - harden-to-doc
        - gaps-to-doc
        - harden-gaps-to-doc
        - stabilize-to-doc
        - chaos-hardening
        - improve-existing
        - test-to-doc
        - docs-only
      # Default iterations (overridable via iterations user option)
      defaultIterations: 1
      # Default time budget in minutes (overridable via minutes user option)
      # When set, iterations continue until time runs out (finishing the active iteration)
      defaultTimeBudgetMinutes: 120
      # Supported work types for type: filtering
      supportedWorkTypes: [tests, docs, stabilize, simplify, gaps, harden, implement, refactor, feature, bugfix, analyze, improve, security, chaos]
      # Shared tail phases after all iterations complete
      tailPhases: [finalize]
      sequentialSpecCompletion: true
      crossAgentVerification: true
      antiFabricationDetection: true
      requireAllSpecialistsComplete: true
      requireAllScopesDoneBeforeSpecDone: true
      requirePerDodItemRawEvidence: true
      requireTestsForAllRealScenarios: true
      require100PercentBusinessLogicCoverage: true
      requirePhaseScopeCoherence: true
      requireImplementationRealityScan: true
      requireNoDefaultsNoFallbacks: true
      requireIntegrationCompleteness: true
